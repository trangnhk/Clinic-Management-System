<div class="card shadow-sm h-100 border-primary">
    <div class="card-header bg-primary text-white fw-bold">
        <i class="fa-solid fa-stethoscope"></i> KHÁM LÂM SÀNG
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label class="fw-bold mb-1">Triệu chứng (Symptoms):</label>
            <textarea id="symptom" class="form-control" rows="3"
                      placeholder="Mô tả triệu chứng..."></textarea>
        </div>
        <div class="mb-3">
            <label class="fw-bold mb-1">Chẩn đoán (Diagnosis):</label>
            <textarea id="diagnosis" class="form-control" rows="3"
                      placeholder="Kết luận chẩn đoán..."></textarea>
        </div>
    </div>
</div>
