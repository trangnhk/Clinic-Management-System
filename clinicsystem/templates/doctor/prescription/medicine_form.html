<div class="card shadow-sm border-success mb-4">
    <div class="card-header bg-success text-white fw-bold text-uppercase">
        <i class="fa-solid fa-pills"></i> Kê đơn thuốc (Prescription)
    </div>
    <div class="card-body">
        <div class="row g-3 align-items-center mb-3">
            <div class="col-md-6 position-relative">
                <label class="form-label fw-bold">Tên thuốc:</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="medKeyword" class="form-control" placeholder="Nhập tên thuốc để tìm..."
                           autocomplete="off">
                </div>
                <ul id="medResults"
                    class="list-group position-absolute w-100 shadow"
                    style="top: 100%; left: 0; z-index: 1050; display: none;
                               max-height: 250px; overflow-y: auto;"
                    data-page="1"
                    data-has-more="true">
                </ul>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold">Đơn vị:</label>
                <input type="text" id="selectedMedUnit" class="form-control bg-light" disabled>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold">Số lượng:</label>
                <input type="number" id="quantity" class="form-control" value="1" min="1">
            </div>

            <div class="col-md-2 d-flex align-items-end">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Cách dùng (Instructions):</label>
            <div class="input-group">
                    <textarea id="usage" class="form-control" rows="2"
                              placeholder="Ví dụ: Sáng 1 viên, Chiều 1 viên sau ăn..."></textarea>
                <button class="btn btn-success px-4 fw-bold" onclick="themThuocVaoList()">
                    <i class="fa-solid fa-plus"></i> THÊM
                </button>
            </div>
        </div>

        <input type="hidden" id="selectedMedId">
        <input type="hidden" id="selectedMedName">
    </div>
</div>
