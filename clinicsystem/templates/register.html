{% extends 'layout/base.html' %}

{% block title %}Đăng ký{%endblock%}

{% block content %}

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="login-wrapper w-100" style="max-width: 400px;">

        <h2 class="text-center fw-bold mb-4">Đăng ký</h2>
        {% if err_msg %}
        <div class="alert alert-danger">
            {{ err_msg }}
        </div>
        {% endif %}
        <form method="POST" enctype="multipart/form-data">
            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                    <span class="text-secondary border-0 bg-transparent">
                        <i class="fa-solid fa-user"></i>
                    </span>
                <input type="text" class="form-control bg-transparent shadow-none fw-semibold text-dark"
                       placeholder="Fullname" required name="fullname">
            </div>

            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                    <span class="text-secondary border-0 bg-transparent">
                        <i class="fa-solid fa-user"></i>
                    </span>
                <input type="text" class="form-control bg-transparent shadow-none fw-semibold text-dark"
                       placeholder="Username" required name="username">
            </div>

            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                    <span class="text-secondary border-0 bg-transparent">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                <input type="password" class="form-control border-0 bg-transparent shadow-none fw-semibold text-dark"
                       placeholder="Password" required name="password">
            </div>

            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                    <span class="text-secondary border-0 bg-transparent">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                <input type="password" class="form-control border-0 bg-transparent shadow-none fw-semibold text-dark"
                       placeholder="Confirm password" required name="confirm">
            </div>

            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                    <span class="text-secondary border-0 bg-transparent">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                <input type="text" class="form-control border-0 bg-transparent shadow-none fw-semibold text-dark"
                       placeholder="Phone number" required name="phone_number">
            </div>
            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
                <span class="text-secondary border-0 bg-transparent">
                <i class="fa-solid fa-calendar"></i>
                </span>
                <input type="date" class="form-control bg-transparent shadow-none fw-semibold text-dark"
                       required name="dob">
            </div>

            <div class="input-group mb-3 rounded-pill bg-light-gray px-3 py-2 align-items-center">
        <span class="text-secondary border-0 bg-transparent">
            <i class="fa-solid fa-venus-mars"></i>
        </span>
                <select class="form-select bg-transparent shadow-none fw-semibold text-dark"
                        style="border: none; border-radius: 50px; padding-left: 0.5;"
                        required name="gender">
                    <option value="" disabled selected hidden>Select GENDER</option>
                    <option value="MALE">MALE</option>
                    <option value="FEMALE">FEMALE</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="avatar" class="form-label">Upload your avatar</label>
                <input class="form-control form-control-sm" id="avatar" type="file" name="avatar"
                       placeholder="Your avatar">
            </div>

            <div class="d-grid gap-2 col-6 mx-auto mb-3">
                <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold"
                        style="background-color: #DB6982; border: none;">
                    Đăng ký
                </button>
            </div>
        </form>

        <div class="text-center mb-3">
            <a href="#" class="text-decoration-none fw-semibold" style="color: #DB6982;">Quên mật khẩu</a>
        </div>

        <p class="text-center text-secondary mb-3">Or sign in with social platforms</p>

        <div class="d-flex justify-content-center gap-3">
            <button class="btn btn-white border rounded-circle d-flex justify-content-center align-items-center social-icon-btn">
                <i class="fa-brands fa-facebook-f text-dark"></i>
            </button>
            <button class="btn btn-white border rounded-circle d-flex justify-content-center align-items-center social-icon-btn">
                <i class="fa-brands fa-google text-dark"></i>
            </button>
        </div>

    </div>
</div>
{% endblock %}
